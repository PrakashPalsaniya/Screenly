version: '3.8'

services:


  # Redis for Seat Locking
  redis:
    image: redis:alpine
    container_name: screenly-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  # RabbitMQ for Email Notifications
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: screenly-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    deploy:
      resources:
        limits:
          memory: 512M

  # Backend API
  backend:
    build: ./backend
    container_name: screenly-backend
    ports:
      - "${BACKEND_PORT:-5002}:${PORT:-5002}"
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      - PORT=${PORT:-5002}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT_INTERNAL:-6379}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - redis
      - rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend Web App
  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5002/api/v1}
        - VITE_RAZORPAY_API_KEY=${VITE_RAZORPAY_API_KEY}
        - VITE_CLOUDFRONT_DOMAIN=${VITE_CLOUDFRONT_DOMAIN}
    container_name: screenly-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

